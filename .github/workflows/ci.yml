name: CI

# Runs on every push and PR. Catches regressions before they hit a release.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Build icons
        # Catches breakage in scripts/build-icons.mjs before it reaches the
        # release workflow, where the same step gates the installer icon.
        run: npm run icons:build

      - name: Typecheck
        run: npm run typecheck

      - name: Tests
        run: npm test

      - name: Lint
        run: npm run lint
